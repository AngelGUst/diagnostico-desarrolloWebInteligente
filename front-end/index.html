<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestión de Empleados</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>&#128100; Gestión de Empleados</h1>
  </header>

  <main>
    <!-- Formulario CRUD -->
    <section class="form-section">
      <h2 id="form-title">Nuevo Empleado</h2>
      <form id="empleado-form">
        <input type="hidden" id="empleado-id" />

        <div class="form-grid">
          <div class="form-group">
            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" placeholder="Nombre" required />
          </div>
          <div class="form-group">
            <label for="apellido">Apellido</label>
            <input type="text" id="apellido" placeholder="Apellido" required />
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="correo@empresa.com" required />
          </div>
          <div class="form-group">
            <label for="cargo">Cargo</label>
            <input type="text" id="cargo" placeholder="Ej: Desarrollador" required />
          </div>
          <div class="form-group">
            <label for="salario">Salario</label>
            <input type="number" id="salario" placeholder="0.00" min="0" step="0.01" required />
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" id="btn-guardar" class="btn btn-primary">Guardar</button>
          <button type="button" id="btn-cancelar" class="btn btn-secondary" onclick="cancelarEdicion()">Cancelar</button>
        </div>
      </form>
    </section>

    <!-- Mensaje de alerta -->
    <div id="alert" class="alert hidden"></div>

    <!-- Tabla de empleados -->
    <section class="table-section">
      <div class="table-header">
        <h2>Lista de Empleados</h2>
        <button class="btn btn-outline" onclick="cargarEmpleados()">&#8635; Actualizar</button>
      </div>
      <div class="table-wrapper">
        <table id="tabla-empleados">
          <thead>
            <tr>
              <th>ID</th>
              <th>Nombre</th>
              <th>Apellido</th>
              <th>Email</th>
              <th>Cargo</th>
              <th>Salario</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr>
              <td colspan="7" class="empty-state">Cargando empleados...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <!-- Modal de confirmación de eliminación -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <h3>Confirmar eliminación</h3>
      <p>¿Estás seguro de que deseas eliminar este empleado?</p>
      <div class="modal-actions">
        <button class="btn btn-danger" id="btn-confirm-delete">Eliminar</button>
        <button class="btn btn-secondary" onclick="cerrarModal()">Cancelar</button>
      </div>
    </div>
  </div>

  <script src="index.js"></script>
</body>
</html>
